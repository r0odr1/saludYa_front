<div class="verify-page">

  <!-- PANTALLA DE ÉXITO -->
  <div class="verify-card animate-in" *ngIf="verificado; else formularioVerificacion">
    <div class="success-icon">🎉</div>
    <h2>¡Cuenta verificada!</h2>
    <p class="verify-subtitle">
      Tu cuenta ha sido activada exitosamente.<br />
      Ya puedes acceder a todas las funcionalidades de SaludYa.
    </p>

    <div class="alert alert-danger" *ngIf="error">⚠️ {{ error }}</div>
    <div class="alert alert-success" *ngIf="exito">✅ {{ exito }}</div>

    <!-- Inputs de 6 dígitos con ngModel -->
    <div class="code-inputs">
      <input
        *ngFor="let d of digitos; let i = index"
        #digitInput
        type="text"
        maxlength="1"
        class="code-digit"
        [(ngModel)]="digitos[i]"
        (keydown)="onKeyDown($event, i)"
        (paste)="onPaste($event, i)"
        (input)="onDigitChange(i)"
        inputmode="numeric"
        autocomplete="off"
        [disabled]="cargando"
      />
    </div>

    <button class="btn btn-primary btn-block btn-lg" (click)="irAlInicio()">
      Ir al inicio ahora →
    </button>

    <div class="resend-section">
      <p>¿No recibiste el código?</p>
      <button 
        class="btn btn-ghost" 
        (click)="reenviar()" 
        [disabled]="reenviando || cooldown > 0"
      >
        {{
          reenviando
            ? 'Enviando...'
            : cooldown > 0
              ? 'Reenviar en ' + cooldown + 's'
              : 'Reenviar código'
        }}
      </button>
    </div>

    <a routerLink="/login" class="back-link">← Volver al inicio de sesión</a>
  </div>
</div>
