<div class="page-wrapper">
  <div class="page-header">
    <h1>Gestión de Doctores</h1>
    <button class="btn btn-primary" (click)="mostrarFormulario = !mostrarFormulario">
      {{ mostrarFormulario ? '✕ Cerrar' : '+ Nuevo Doctor' }}
    </button>
  </div>

  <!-- Formulario nuevo doctor -->
  <div class="card-flat form-card animate-in" *ngIf="mostrarFormulario">
    <h3 style="margin-bottom:16px">Registrar Doctor</h3>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="exito">{{ exito }}</div>
    <div class="form-row">
      <div class="form-group"><label>Nombre</label><input class="form-control" [(ngModel)]="nuevoDoc.nombre" placeholder="Nombre completo"></div>
      <div class="form-group"><label>Email</label><input class="form-control" [(ngModel)]="nuevoDoc.email" placeholder="doctor@saludya.com" type="email"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Teléfono</label><input class="form-control" [(ngModel)]="nuevoDoc.telefono" placeholder="300..."></div>
      <div class="form-group"><label>Contraseña</label><input class="form-control" [(ngModel)]="nuevoDoc.password" type="password" placeholder="Mín. 8 caracteres"></div>
    </div>
    <div class="form-group">
      <label>Especialidades</label>
      <div class="checkbox-group">
        <label class="checkbox-item" *ngFor="let esp of especialidades">
          <input type="checkbox" [checked]="nuevoDoc.especialidades.includes(esp._id)" (change)="toggleEsp(esp._id)">
          {{ esp.nombre }}
        </label>
      </div>
    </div>
    <h4 style="margin:16px 0 8px">Horarios de atención</h4>
    <div class="horario-config">
      <div class="horario-dia" *ngFor="let dia of diasSemana">
        <label class="checkbox-item">
          <input type="checkbox" [(ngModel)]="dia.activo">
          <strong>{{ dia.nombre }}</strong>
        </label>
        <div class="horario-inputs" *ngIf="dia.activo">
          <input type="time" [(ngModel)]="dia.horaInicio" class="form-control time-input">
          <span>a</span>
          <input type="time" [(ngModel)]="dia.horaFin" class="form-control time-input">
        </div>
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:20px" (click)="registrarDoctor()" [disabled]="procesando">
      {{ procesando ? 'Registrando...' : 'Registrar Doctor' }}
    </button>
  </div>

  <!-- Lista de doctores -->
  <div *ngIf="cargando" class="loading-wrapper"><div class="spinner"></div></div>
  <div class="doc-list" *ngIf="!cargando">
    <div class="doc-item animate-in" *ngFor="let doc of doctores; let i = index" [style.animation-delay]="(i*0.06)+'s'">
      <div class="doc-avatar" [style.background]="doc.activo ? '#0f5132' : '#999'">{{ doc.usuario?.nombre?.charAt(0) }}</div>
      <div class="doc-info">
        <h4>{{ doc.usuario?.nombre }}</h4>
        <p>{{ doc.usuario?.email }} · {{ doc.usuario?.telefono }}</p>
        <div class="doc-esps">
          <span class="esp-mini" *ngFor="let esp of doc.especialidades">{{ esp.nombre }}</span>
        </div>
      </div>
      <span class="badge" [ngClass]="doc.activo ? 'badge-success' : 'badge-danger'">
        {{ doc.activo ? 'Activo' : 'Inactivo' }}
      </span>
    </div>
  </div>
</div>
