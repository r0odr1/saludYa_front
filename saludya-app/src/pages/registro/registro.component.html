<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-brand">
        <span>🏥</span>
        <h1>Salud<span>Ya</span></h1>
      </div>
      <p class="auth-tagline">
        Crea tu cuenta y comienza a gestionar tus citas de fisioterapia hoy mismo.
      </p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrapper">
      <h2>Crear Cuenta</h2>
      <p class="auth-subtitle">Completa tus datos para registrarte</p>

      <div class="alert alert-danger" *ngIf="error">⚠️ {{ error }}</div>

      <form (ngSubmit)="onRegistro()">
        <div class="form-group">
          <label>Nombre completo</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="datos.nombre"
            name="nombre"
            placeholder="Ej: Juan Pérez"
            required
          />
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input
            type="email"
            class="form-control"
            [(ngModel)]="datos.email"
            name="email"
            placeholder="tu@correo.com"
            required
          />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input
            type="tel"
            class="form-control"
            [(ngModel)]="datos.telefono"
            name="telefono"
            placeholder="300 123 4567"
          />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="datos.password"
            name="password"
            placeholder="Mín. 8 caracteres, 1 mayúscula, 1 número"
            required
          />
          <p class="hint">Mínimo 8 caracteres, una mayúscula y un número</p>
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="confirmarPassword"
            name="confirmar"
            placeholder="Repite tu contraseña"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="cargando">
          {{ cargando ? 'Registrando...' : 'Crear cuenta' }}
        </button>
      </form>

      <p class="auth-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>
  </div>
</div>
